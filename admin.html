<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Quản trị SIMILOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="admin-body">
  <main class="admin-card">
    <h1>Quản trị SIMILOCK</h1>
    <p>Đăng nhập bằng tài khoản quản trị Firebase Authentication.</p>
    <form class="lead-form" id="admin-login">
      <input type="email" id="admin-email" autocomplete="username" placeholder="Email" required>
      <input type="password" id="admin-password" autocomplete="current-password" placeholder="Mật khẩu" required>
      <button class="btn btn-primary" type="submit">Đăng nhập</button>
      <p class="form-status" id="admin-status" aria-live="polite"></p>
    </form>
  </main>
  <script type="module" src="assets/admin.js"></script>
</body>
</html>
