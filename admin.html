<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin CMS SIMILOCK</title><link rel="stylesheet" href="assets/styles.css"><style>.admin{padding:40px 0}.admin-grid{display:grid;grid-template-columns:320px 1fr;gap:20px}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 12px 35px rgba(7,17,31,.05)}.row{display:grid;grid-template-columns:1fr 130px 1fr;gap:12px;padding:12px;border-bottom:1px solid var(--line)}@media(max-width:800px){.admin-grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="container nav"><a class="brand" href="index.html"><span class="logo">S</span><span>SIMILOCK CMS</span></a><button class="cta ghost" id="out">Đăng xuất</button></div></header><main class="container admin"><form class="panel lead-form" id="loginForm"><h1>Đăng nhập Admin</h1><input id="email" type="email" placeholder="Email admin" required><input id="password" type="password" placeholder="Mật khẩu" required><button class="cta" type="submit">Đăng nhập</button></form><section id="adminApp" style="display:none"><div class="head"><div class="eyebrow">Dashboard</div><h1>Quản trị SIMILOCK</h1><p>Quản lý lead và nhập dữ liệu sản phẩm cơ bản. Có thể mở rộng thành CMS đầy đủ.</p></div><div class="admin-grid"><div class="panel"><h3>Thêm sản phẩm</h3><form id="productForm" class="lead-form"><input name="name" placeholder="Tên sản phẩm"><input name="price" placeholder="Giá"><textarea name="description" placeholder="Mô tả"></textarea><button class="cta" type="submit">Lưu sản phẩm</button></form></div><div class="panel"><h3>Lead mới</h3><div id="leadsBox"></div></div></div></section></main><script type="module" src="assets/admin.js"></script></body></html>
